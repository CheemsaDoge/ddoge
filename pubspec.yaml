name: ddoge
description: "DDoge 课程表 — 精美现代的多平台课程表应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 数据库
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # 路由
  go_router: ^14.8.1

  # 网络与解析
  dio: ^5.8.0+1
  html: ^0.15.6
  webview_flutter: ^4.10.0

  # 数据模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 主题
  dynamic_color: ^1.7.0

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

  # 文件选择与持久化
  file_picker: ^8.0.0
  shared_preferences: ^2.3.0

  # 图标
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/wallpapers/
